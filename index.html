<!DOCTYPE html>
<html>
<head>
<title>Auth App</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}
input {
  padding: 10px;
  margin: 5px;
  width: 220px;
}
button {
  padding: 10px;
  background: #4CAF50;
  color: white;
  border: none;
  cursor: pointer;
}
</style>

</head>
<body>

<h2>Register</h2>
<input id="regUser" placeholder="Email"><br>
<input id="regPass" type="password" placeholder="Password"><br>
<button onclick="register()">Register</button>

<hr>

<h2>Login</h2>
<input id="logUser" placeholder="Email"><br>
<input id="logPass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>

<hr>

<h2>OTP</h2>
<input id="otpUser" placeholder="Email"><br>
<button onclick="sendOtp()">Send OTP</button><br>
<input id="otpValue" placeholder="OTP"><br>
<button onclick="verifyOtp()">Verify OTP</button>

<hr>

<h2>Forgot Password</h2>
<input id="fpUser" placeholder="Email"><br>
<input id="fpOtp" placeholder="OTP"><br>
<input id="newPass" type="password" placeholder="New Password"><br>
<button onclick="resetPassword()">Reset</button>

<script>

// 🔥 PUT YOUR RENDER URL HERE
const BASE_URL = "https://iam-project.onrender.com";

// ================= REGISTER =================
async function register() {
  console.log("Register clicked");

  const username = regUser.value;
  const password = regPass.value;

  try {
    const res = await fetch(`${BASE_URL}/auth/register`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ username, password })
    });

    console.log("Register status:", res.status);

    const data = await res.text();
    console.log("Register response:", data);

    alert(data);

  } catch (err) {
    console.log("REGISTER ERROR 👉", err);
    alert("Register failed ❌");
  }
}

// ================= LOGIN =================
async function login() {
  console.log("Login clicked");

  const username = logUser.value;
  const password = logPass.value;

  try {
    const res = await fetch(`${BASE_URL}/auth/login`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ username, password })
    });

    console.log("Login status:", res.status);

    const data = await res.json();
    console.log("Login response:", data);

    if (data.token) {
      localStorage.setItem("token", data.token);
      alert("Login Success ✅");
      window.location.href = "dashboard.html";
    } else {
      alert("Login failed ❌");
    }

  } catch (err) {
    console.log("LOGIN ERROR 👉", err);
    alert("Something went wrong ❌");
  }
}

// ================= SEND OTP =================
async function sendOtp() {
  console.log("Send OTP clicked");

  const username = otpUser.value;

  try {
    const res = await fetch(`${BASE_URL}/auth/send-otp`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ username })
    });

    console.log("OTP status:", res.status);

    const data = await res.text();
    console.log("OTP response:", data);

    alert(data);

  } catch (err) {
    console.log("OTP ERROR 👉", err);
    alert("OTP failed ❌");
  }
}

// ================= VERIFY OTP =================
async function verifyOtp() {
  console.log("Verify OTP clicked");

  const username = otpUser.value;
  const otp = otpValue.value;

  try {
    const res = await fetch(`${BASE_URL}/auth/verify-otp`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ username, otp })
    });

    const data = await res.text();
    console.log("Verify response:", data);

    alert(data);

  } catch (err) {
    console.log("VERIFY ERROR 👉", err);
    alert("Verification failed ❌");
  }
}

// ================= RESET PASSWORD =================
async function resetPassword() {
  console.log("Reset clicked");

  const username = fpUser.value;
  const otp = fpOtp.value;
  const newPassword = newPass.value;

  try {
    const res = await fetch(`${BASE_URL}/auth/reset-password`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ username, otp, newPassword })
    });

    const data = await res.text();
    console.log("Reset response:", data);

    alert(data);

  } catch (err) {
    console.log("RESET ERROR 👉", err);
    alert("Reset failed ❌");
  }
}

</script>

</body>
</html>
