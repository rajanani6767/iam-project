<!DOCTYPE html>
<html>
<head>
<title>Auth App</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}
input {
  padding: 10px;
  margin: 5px;
  width: 220px;
}
button {
  padding: 10px;
  background: #4CAF50;
  color: white;
  border: none;
  cursor: pointer;
}
</style>

</head>
<body>

<h2>Register</h2>
<input id="regUser" placeholder="Email"><br>
<input id="regPass" type="password" placeholder="Password"><br>
<button onclick="register()">Register</button>

<hr>

<h2>Login</h2>
<input id="logUser" placeholder="Email"><br>
<input id="logPass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>

<hr>

<h2>OTP</h2>
<input id="otpUser" placeholder="Email"><br>
<button onclick="sendOtp()">Send OTP</button><br>
<input id="otpValue" placeholder="OTP"><br>
<button onclick="verifyOtp()">Verify OTP</button>

<hr>

<h2>Forgot Password</h2>
<input id="fpUser" placeholder="Email"><br>
<input id="fpOtp" placeholder="OTP"><br>
<input id="newPass" type="password" placeholder="New Password"><br>
<button onclick="resetPassword()">Reset</button>

<script>
async function register() {
  const username = regUser.value;
  const password = regPass.value;

  if (password.length < 8) {
    alert("Password must be at least 8 chars ❌");
    return;
  }

  const res = await fetch("http://localhost:5000/auth/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, password })
  });

  alert(await res.text());
}

async function login() {
  const username = logUser.value;
  const password = logPass.value;

  const res = await fetch("http://localhost:5000/auth/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    alert("Login Success ✅");
    window.location.href = "dashboard.html";
  } else {
    alert("Login failed ❌");
  }
}

async function sendOtp() {
  const username = otpUser.value;

  const res = await fetch("http://localhost:5000/auth/send-otp", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username })
  });

  alert(await res.text());
}

async function verifyOtp() {
  const username = otpUser.value;
  const otp = otpValue.value;

  const res = await fetch("http://localhost:5000/auth/verify-otp", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, otp })
  });

  alert(await res.text());
}

async function resetPassword() {
  const username = fpUser.value;
  const otp = fpOtp.value;
  const newPassword = newPass.value;

  const res = await fetch("http://localhost:5000/auth/reset-password", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, otp, newPassword })
  });

  alert(await res.text());
}
</script>

</body>
</html>
