<!DOCTYPE html>
<html>
<head>
<title>Auth App</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}
input {
  padding: 10px;
  margin: 5px;
  width: 220px;
}
button {
  padding: 10px;
  background: #4CAF50;
  color: white;
  border: none;
  cursor: pointer;
}
</style>

</head>
<body>

<h2>Register</h2>
<input id="regUser" placeholder="Email"><br>
<input id="regPass" type="password" placeholder="Password"><br>
<button onclick="register()">Register</button>

<hr>

<h2>Login</h2>
<input id="logUser" placeholder="Email"><br>
<input id="logPass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>

<hr>

<h2>OTP</h2>
<input id="otpUser" placeholder="Email"><br>
<button onclick="sendOtp()">Send OTP</button><br>
<input id="otpValue" placeholder="OTP"><br>
<button onclick="verifyOtp()">Verify OTP</button>

<hr>

<h2>Forgot Password</h2>
<input id="fpUser" placeholder="Email"><br>
<input id="fpOtp" placeholder="OTP"><br>
<input id="newPass" type="password" placeholder="New Password"><br>
<button onclick="resetPassword()">Reset</button>

<hr>

<h2>AI Assistant 🤖</h2>
<input id="aiInput" placeholder="Ask something..."><br>
<button onclick="askAI()">Ask</button>

<p id="aiResponse"></p>

<script>

const BASE_URL = "https://iam-project.onrender.com";

// REGISTER
async function register() {
  const username = regUser.value;
  const password = regPass.value;

  const res = await fetch(`${BASE_URL}/auth/register`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, password })
  });

  alert(await res.text());
}

// LOGIN
async function login() {
  const username = logUser.value;
  const password = logPass.value;

  const res = await fetch(`${BASE_URL}/auth/login`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    alert("Login Success ✅");
    window.location.href = "dashboard.html";
  } else {
    alert("Login failed ❌");
  }
}

// SEND OTP
async function sendOtp() {
  const username = otpUser.value;

  const res = await fetch(`${BASE_URL}/auth/send-otp`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username })
  });

  alert(await res.text());
}

// VERIFY OTP
async function verifyOtp() {
  const username = otpUser.value;
  const otp = otpValue.value;

  const res = await fetch(`${BASE_URL}/auth/verify-otp`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, otp })
  });

  alert(await res.text());
}

// RESET PASSWORD
async function resetPassword() {
  const username = fpUser.value;
  const otp = fpOtp.value;
  const newPassword = newPass.value;

  const res = await fetch(`${BASE_URL}/auth/reset-password`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, otp, newPassword })
  });

  alert(await res.text());
}

// AI
async function askAI() {
  const message = aiInput.value;

  const res = await fetch(`${BASE_URL}/auth/ai-help`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message })
  });

  const data = await res.json();
  aiResponse.innerText = data.reply;
}

</script>

</body>
</html>
