<!DOCTYPE html>
<html>
<head>
<title>Auth System 🔐</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0c10;
  color: #66fcf1;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 350px;
  padding: 25px;
  background: #111;
  border-radius: 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  background: black;
  color: #66fcf1;
  border: 1px solid #45a29e;
}

button {
  width: 100%;
  padding: 10px;
  background: #45a29e;
  border: none;
  cursor: pointer;
}

#strengthText {
  font-size: 14px;
}
</style>

</head>

<body>

<div class="container">

<h3>Login</h3>
<input id="logUser" placeholder="Email">
<input id="logPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<hr>

<h3>Register</h3>
<input id="regUser" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<div id="strengthText"></div>
<button onclick="register()">Register</button>

<hr>

<h3>Password Generator</h3>
<input id="pwLength" type="number" value="12">
<button onclick="generatePassword()">Generate</button>
<p id="generatedPw"></p>

</div>

<script>

const BASE_URL = "https://iam-project.onrender.com";

// PASSWORD STRENGTH
regPass.addEventListener("input", () => {
  const val = regPass.value;

  let strength = "Weak ❌";
  let color = "red";

  if (val.length >= 8 && /[A-Z]/.test(val) && /\d/.test(val)) {
    strength = "Medium ⚠️";
    color = "orange";
  }

  if (val.length >= 8 && /[@$!%*?&]/.test(val)) {
    strength = "Strong ✅";
    color = "lime";
  }

  strengthText.innerText = "Strength: " + strength;
  strengthText.style.color = color;
});

// REGISTER
async function register() {
  const res = await fetch(`${BASE_URL}/auth/register`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: regUser.value,
      password: regPass.value
    })
  });

  alert(await res.text());
}

// LOGIN
async function login() {
  const res = await fetch(`${BASE_URL}/auth/login`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: logUser.value,
      password: logPass.value
    })
  });

  const data = await res.json();

  if (data.success && data.token) {
    localStorage.setItem("token", data.token);
    window.location.href = "dashboard.html";
  } else {
    alert(data.message);
  }
}

// GENERATOR
async function generatePassword() {
  const res = await fetch(`${BASE_URL}/auth/generate-password?length=${pwLength.value}`);
  const data = await res.json();
  generatedPw.innerText = data.password;
}

</script>

</body>
</html>
