<!DOCTYPE html>
<html>
<head>
<title>Secure Auth 🔐</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  width: 380px;
  padding: 25px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  box-shadow: 0 0 30px rgba(0,255,200,0.2);
}

.tabs {
  display: flex;
  gap: 5px;
  margin-bottom: 15px;
}

.tabs button {
  flex: 1;
  padding: 10px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: #66fcf1;
  cursor: pointer;
  border-radius: 5px;
}

.tabs button.active {
  background: #45a29e;
  color: black;
}

.form { display:none; }
.form.active { display:block; }

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  background: #45a29e;
  border: none;
  margin-top: 10px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.rules p {
  margin: 3px 0;
  font-size: 13px;
}

.generator {
  margin-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.2);
  padding-top: 15px;
}

#generatedPw {
  margin-top:10px;
  padding:10px;
  background:#111;
  color:#00ffcc;
  font-weight:bold;
  border-radius:8px;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

<div class="tabs">
  <button onclick="showForm('login')" class="active">Login</button>
  <button onclick="showForm('register')">Register</button>
  <button onclick="showForm('forgot')">Forgot</button>
</div>

<!-- LOGIN -->
<div id="login" class="form active">
  <input id="logUser" placeholder="Email">
  <input id="logPass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- REGISTER -->
<div id="register" class="form">
  <input id="regUser" placeholder="Email">
  <input id="regPass" type="password" placeholder="Password">

  <div class="rules">
    <p id="length">❌ Minimum 8 characters</p>
    <p id="upper">❌ Uppercase letter</p>
    <p id="lower">❌ Lowercase letter</p>
    <p id="number">❌ Number required</p>
    <p id="special">❌ Special character</p>
  </div>

  <button onclick="register()">Register</button>
</div>

<!-- FORGOT -->
<div id="forgot" class="form">
  <input id="fpUser" placeholder="Email">
  <button onclick="sendOtp()">Send OTP</button>
  <input id="fpOtp" placeholder="OTP">
  <input id="newPass" type="password" placeholder="New Password">
  <button onclick="resetPassword()">Reset</button>
</div>

<!-- GENERATOR -->
<div class="generator">
  <h4>Password Generator 🔐</h4>

  <input id="pwLength" type="number" value="12" min="8" max="32">

  <p id="pwError" style="color:red; font-size:13px;"></p>

  <button onclick="generatePassword()">Generate</button>

  <p id="generatedPw"></p>
</div>

</div>

<script>

const BASE_URL = "https://iam-project.onrender.com";

// TAB SWITCH
function showForm(id){
  document.querySelectorAll(".form").forEach(f=>f.classList.remove("active"));
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));

  document.getElementById(id).classList.add("active");
  event.target.classList.add("active");
}

// PASSWORD RULES
const regPass = document.getElementById("regPass");

regPass.addEventListener("input", () => {
  const val = regPass.value;

  const length = document.getElementById("length");
  const upper = document.getElementById("upper");
  const lower = document.getElementById("lower");
  const number = document.getElementById("number");
  const special = document.getElementById("special");

  length.innerHTML = val.length >= 8 ? "✅ Minimum 8 characters" : "❌ Minimum 8 characters";
  length.style.color = val.length >= 8 ? "#00ffcc" : "red";

  upper.innerHTML = /[A-Z]/.test(val) ? "✅ Uppercase letter" : "❌ Uppercase letter";
  upper.style.color = /[A-Z]/.test(val) ? "#00ffcc" : "red";

  lower.innerHTML = /[a-z]/.test(val) ? "✅ Lowercase letter" : "❌ Lowercase letter";
  lower.style.color = /[a-z]/.test(val) ? "#00ffcc" : "red";

  number.innerHTML = /\d/.test(val) ? "✅ Number included" : "❌ Number required";
  number.style.color = /\d/.test(val) ? "#00ffcc" : "red";

  special.innerHTML = /[@$!%*?&]/.test(val) ? "✅ Special character" : "❌ Special character";
  special.style.color = /[@$!%*?&]/.test(val) ? "#00ffcc" : "red";
});

// REGISTER
async function register(){
  const res = await fetch(`${BASE_URL}/auth/register`, {
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      username:regUser.value,
      password:regPass.value
    })
  });

  const data = await res.json();

  if(data.errors){
    alert(data.errors[0].msg);
    return;
  }

  alert(data.message || "Error ❌");
}

// LOGIN
async function login(){
  const res = await fetch(`${BASE_URL}/auth/login`, {
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    credentials:"include",
    body:JSON.stringify({
      username:logUser.value,
      password:logPass.value
    })
  });

  const data = await res.json();

  if(res.ok){
    alert("Login Success ✅");
    window.location="dashboard.html";
  } else {
    alert(data.message || "Login failed ❌");
  }
}

// GENERATOR
async function generatePassword(){
  const length = parseInt(pwLength.value);
  const errorBox = document.getElementById("pwError");

  errorBox.innerText = "";
  generatedPw.innerText = "";

  if(isNaN(length)){
    errorBox.innerText = "Enter a number ❌";
    return;
  }

  if(length < 8){
    errorBox.innerText = "Minimum length is 8 ❌";
    return;
  }

  if(length > 32){
    errorBox.innerText = "Maximum length is 32 ❌";
    return;
  }

  const res = await fetch(`${BASE_URL}/auth/generate-password?length=${length}`);
  const data = await res.json();

  generatedPw.innerText = data.password;
}

// LIVE VALIDATION
pwLength.addEventListener("input", () => {
  const val = parseInt(pwLength.value);
  const errorBox = document.getElementById("pwError");

  if(val < 8){
    errorBox.innerText = "Minimum 8 required ❌";
  } else if(val > 32){
    errorBox.innerText = "Max 32 allowed ❌";
  } else {
    errorBox.innerText = "";
  }
});

// OTP
async function sendOtp(){
  const res = await fetch(`${BASE_URL}/auth/send-otp`,{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({ username:fpUser.value })
  });

  const data = await res.json();
  alert("OTP: "+data.demoOtp);
}

// RESET
async function resetPassword(){
  const res = await fetch(`${BASE_URL}/auth/reset-password`,{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      username:fpUser.value,
      otp:fpOtp.value,
      newPassword:newPass.value
    })
  });

  const data = await res.json();
  alert(data.message);
}

</script>

</body>
</html>
