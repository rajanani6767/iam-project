<!DOCTYPE html>
<html>
<head>
<title>Secure Auth 🔐</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  width: 380px;
  padding: 25px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  box-shadow: 0 0 30px rgba(0,255,200,0.2);
}

h2 {
  text-align: center;
  color: #66fcf1;
}

.tabs {
  display: flex;
  gap: 5px;
  margin-bottom: 15px;
}

.tabs button {
  flex: 1;
  padding: 10px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: #66fcf1;
  cursor: pointer;
  border-radius: 5px;
}

.tabs button.active {
  background: #45a29e;
  color: black;
}

.form {
  display: none;
}

.form.active {
  display: block;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

button.submit {
  width: 100%;
  padding: 12px;
  background: #45a29e;
  border: none;
  color: black;
  margin-top: 10px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.generator {
  margin-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.2);
  padding-top: 15px;
}

.generator h4 {
  color: #66fcf1;
}
</style>
</head>

<body>

<div class="container">

<h2>Auth System 🔐</h2>

<div class="tabs">
  <button onclick="showForm('login')" class="active">Login</button>
  <button onclick="showForm('register')">Register</button>
  <button onclick="showForm('forgot')">Forgot</button>
</div>

<!-- LOGIN -->
<div id="login" class="form active">
  <input id="logUser" placeholder="Email">
  <input id="logPass" type="password" placeholder="Password">
  <button class="submit" onclick="login()">Login</button>
</div>

<!-- REGISTER -->
<div id="register" class="form">
  <input id="regUser" placeholder="Email">
  <input id="regPass" type="password" placeholder="Password">
  <button class="submit" onclick="register()">Register</button>
</div>

<!-- FORGOT -->
<div id="forgot" class="form">
  <input id="fpUser" placeholder="Email">
  <button class="submit" onclick="sendOtp()">Send OTP</button>
  <input id="fpOtp" placeholder="OTP">
  <input id="newPass" type="password" placeholder="New Password">
  <button class="submit" onclick="resetPassword()">Reset Password</button>
</div>

<!-- GENERATOR -->
<div class="generator">
  <h4>Password Generator 🔐</h4>
  <input id="pwLength" type="number" value="12" min="8" max="32">
  <button class="submit" onclick="generatePassword()">Generate</button>
  <p id="generatedPw"></p>
</div>

</div>

<script>

const BASE_URL = "https://iam-project.onrender.com";

// SWITCH TAB
function showForm(id) {
  document.querySelectorAll(".form").forEach(f => f.classList.remove("active"));
  document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));

  document.getElementById(id).classList.add("active");
  event.target.classList.add("active");
}

// LOGIN
async function login(){
  const res = await fetch(`${BASE_URL}/auth/login`, {
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    credentials:"include",
    body:JSON.stringify({
      username:logUser.value,
      password:logPass.value
    })
  });

  const data = await res.json();

  if(res.ok){
    alert("Login Success ✅");
    window.location="dashboard.html";
  } else {
    alert(data.message);
  }
}

// REGISTER
async function register(){
  const res = await fetch(`${BASE_URL}/auth/register`,{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      username:regUser.value,
      password:regPass.value
    })
  });

  const data = await res.json();
  alert(data.message);
}

// OTP
async function sendOtp(){
  const res = await fetch(`${BASE_URL}/auth/send-otp`,{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({ username:fpUser.value })
  });

  const data = await res.json();
  alert("OTP: "+data.demoOtp);
}

// RESET
async function resetPassword(){
  const res = await fetch(`${BASE_URL}/auth/reset-password`,{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      username:fpUser.value,
      otp:fpOtp.value,
      newPassword:newPass.value
    })
  });

  const data = await res.json();
  alert(data.message);
}

// GENERATOR
async function generatePassword(){
  const res = await fetch(`${BASE_URL}/auth/generate-password?length=${pwLength.value}`);
  const data = await res.json();
  generatedPw.innerText = data.password;
}

</script>

</body>
</html>
