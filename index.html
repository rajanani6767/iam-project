<!DOCTYPE html>
<html>
<head>
<title>Auth System 🔐</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0c10;
  color: #66fcf1;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 380px;
  padding: 25px;
  background: #111;
  border-radius: 12px;
}

.tabs button {
  width: 33%;
  padding: 10px;
}

.form { display:none; }
.form.active { display:block; }

input {
  width:100%;
  padding:10px;
  margin:8px 0;
}

button { padding:10px; width:100%; }
</style>
</head>

<body>

<div class="container">

<div class="tabs">
  <button onclick="showForm('login')">Login</button>
  <button onclick="showForm('register')">Register</button>
  <button onclick="showForm('forgot')">Forgot</button>
</div>

<!-- LOGIN -->
<div id="login" class="form active">
  <input id="logUser" placeholder="Email">
  <input id="logPass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- REGISTER -->
<div id="register" class="form">
  <input id="regUser" placeholder="Email">
  <input id="regPass" type="password" placeholder="Password">
  <button onclick="register()">Register</button>
</div>

<!-- FORGOT -->
<div id="forgot" class="form">
  <input id="fpUser" placeholder="Email">
  <button onclick="sendOtp()">Send OTP</button>
  <input id="fpOtp" placeholder="OTP">
  <input id="newPass" placeholder="New Password">
  <button onclick="resetPassword()">Reset</button>
</div>

<!-- GENERATOR -->
<h4>Password Generator</h4>
<input id="pwLength" type="number" value="12">
<button onclick="generatePassword()">Generate</button>
<p id="generatedPw"></p>

</div>

<script>

const BASE_URL = "https://iam-project.onrender.com";

function showForm(id){
  document.querySelectorAll(".form").forEach(f=>f.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// LOGIN
async function login(){
  const res = await fetch(`${BASE_URL}/auth/login`, {
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    credentials:"include",
    body:JSON.stringify({
      username:logUser.value,
      password:logPass.value
    })
  });

  if(res.ok){
    alert("Login success");
    window.location="dashboard.html";
  }
}

// REGISTER
async function register(){
  const res = await fetch(`${BASE_URL}/auth/register`,{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      username:regUser.value,
      password:regPass.value
    })
  });

  const data = await res.json();
  alert(data.message);
}

// OTP
async function sendOtp(){
  const res = await fetch(`${BASE_URL}/auth/send-otp`,{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({ username:fpUser.value })
  });

  const data = await res.json();
  alert("OTP: "+data.demoOtp);
}

// RESET
async function resetPassword(){
  const res = await fetch(`${BASE_URL}/auth/reset-password`,{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      username:fpUser.value,
      otp:fpOtp.value,
      newPassword:newPass.value
    })
  });

  const data = await res.json();
  alert(data.message);
}

// GENERATOR
async function generatePassword(){
  const res = await fetch(`${BASE_URL}/auth/generate-password?length=${pwLength.value}`);
  const data = await res.json();
  generatedPw.innerText = data.password;
}

</script>

</body>
</html>
