<!DOCTYPE html>
<html>
<head>
<title>Auth App</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}
input {
  padding: 10px;
  margin: 5px;
  width: 220px;
}
button {
  padding: 10px;
  background: #4CAF50;
  color: white;
  border: none;
  cursor: pointer;
}
</style>

</head>
<body>

<h2>Register</h2>
<input id="regUser" placeholder="Email"><br>
<input id="regPass" type="password" placeholder="Password"><br>
<button onclick="register()">Register</button>

<hr>

<h2>Login</h2>
<input id="logUser" placeholder="Email"><br>
<input id="logPass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>

<hr>

<h2>OTP</h2>
<input id="otpUser" placeholder="Email"><br>
<button onclick="sendOtp()">Send OTP</button><br>
<input id="otpValue" placeholder="OTP"><br>
<button onclick="verifyOtp()">Verify OTP</button>

<hr>

<h2>Forgot Password</h2>
<input id="fpUser" placeholder="Email"><br>
<input id="fpOtp" placeholder="OTP"><br>
<input id="newPass" type="password" placeholder="New Password"><br>
<button onclick="resetPassword()">Reset</button>

<hr>

<h2>Password Generator 🔐</h2>
<input id="pwLength" type="number" value="12"><br>
<button onclick="generatePassword()">Generate</button>
<p id="generatedPw"></p>
<button onclick="copyPassword()">Copy</button>

<script>
const BASE_URL = "https://iam-project.onrender.com";

// REGISTER
async function register() {
  const res = await fetch(`${BASE_URL}/auth/register`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: regUser.value,
      password: regPass.value
    })
  });
  alert(await res.text());
}

// LOGIN
async function login() {
  const res = await fetch(`${BASE_URL}/auth/login`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: logUser.value,
      password: logPass.value
    })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    alert("Login Success ✅");
    window.location.href = "dashboard.html";
  } else {
    alert("Login failed ❌");
  }
}

// OTP
async function sendOtp() {
  const res = await fetch(`${BASE_URL}/auth/send-otp`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username: otpUser.value })
  });
  alert(await res.text());
}

async function verifyOtp() {
  const res = await fetch(`${BASE_URL}/auth/verify-otp`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: otpUser.value,
      otp: otpValue.value
    })
  });
  alert(await res.text());
}

// RESET
async function resetPassword() {
  const res = await fetch(`${BASE_URL}/auth/reset-password`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: fpUser.value,
      otp: fpOtp.value,
      newPassword: newPass.value
    })
  });
  alert(await res.text());
}

// PASSWORD GENERATOR
async function generatePassword() {
  const length = pwLength.value;

  const res = await fetch(`${BASE_URL}/auth/generate-password?length=${length}`);
  const data = await res.json();

  generatedPw.innerText = data.password;
}

function copyPassword() {
  navigator.clipboard.writeText(generatedPw.innerText);
  alert("Copied ✅");
}
</script>

</body>
</html>
